<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fre</title>
    <style>
        body {
            margin: 0;
            background: black;
        }
        video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>

<video id="vid" autoplay playsinline>
    <source src="videoplayback.mp4" type="video/mp4">
</video>

<script>
    const video = document.getElementById("vid");

    // Try to play with sound
    video.play().catch(() => {
        // If blocked, wait for user interaction
        document.addEventListener("click", () => {
            video.play();
        }, { once: true });
    });
</script>

</body>
</html>
